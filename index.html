<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #000;
      background: #fff;
      padding: 20px;
      min-height: 100vh;
    }

    a { color: #00e; text-decoration: underline; }
    a:visited { color: #551a8b; }
    a:hover { color: #f00; }

    hr { border: none; border-top: 1px solid #000; margin: 12px 0; }

    #topbar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }

    #topbar a { font-size: 11px; color: #00e; text-decoration: underline; }
    #topbar a:visited { color: #551a8b; }

    #layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      min-height: calc(100vh - 80px);
    }

    #nav {
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 100px;
      position: sticky;
      top: 20px;
      align-self: flex-start;
    }

    #nav a { display: block; }

    #manifesto {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 40px;
    }

    .letter {
      font-size: 13px;
      line-height: 2;
      color: #888;
      max-width: 360px;
    }

    .letter p { margin-bottom: 20px; }
    .letter p:last-child { margin-bottom: 0; }

    #footer { margin-top: 20px; font-size: 12px; color: #555; }

    @media (max-width: 600px) {
      body { padding: 14px; font-size: 13px; }
      #topbar { flex-direction: column; gap: 4px; }
      #layout { flex-direction: column; gap: 24px; min-height: unset; }
      #nav { flex-direction: row; flex-wrap: wrap; gap: 10px 20px; position: static; min-width: unset; }
      #manifesto { padding-top: 0; justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <div id="topbar">
    
    <span>reach out &nbsp;&nbsp;<a href="https://instagram.com/d.hamanjo" target="_blank">instagram // @d.hamanjo</a></span>
  </div>

  <hr>

  <div id="layout">

    <div id="nav">
      <a href="objects.html">Objects</a>
      <a href="chronology.html">Chronology</a>
      <a href="lectures.html">Lectures</a>
    </div>

    <div id="manifesto">
      <div class="letter">
        <p>To Advanced Disciples,</p>
        <p>for those who have eyes to see<br>and ears to hear: sit on the plinth and pick your struggle.</p>
        <p>— d.h</p>
      </div>
    </div>

  </div>

  <hr>

  <div id="footer">
    &copy; 2026 Advanced Disciples &nbsp;·&nbsp; All rights reserved
  </div>

</body>
</html>
