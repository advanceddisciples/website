<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Disciples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
    }

    #header {
      padding: 20px 40px 16px;
      border-bottom: 1px solid #eee;
      text-align: center;
      font-family: monospace;
      font-size: 11px;
      color: #888;
      line-height: 2;
    }

    #footer {
      padding: 10px 40px;
      font-family: monospace;
      font-size: 11px;
      color: #bbb;
      text-align: center;
      position: relative;
      z-index: 10;
      background: #fff;
    }

    #scroll-container {
      width: 100vw;
      height: calc(100vh - 160px);
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      cursor: grab;
      touch-action: none;
    }
    canvas:active { cursor: grabbing; }

    #reset-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: monospace;
      font-size: 11px;
      color: #000;
      background: none;
      border: none;
      border-bottom: 1px solid #000;
      padding: 2px 0;
      cursor: pointer;
      z-index: 50;
      letter-spacing: 0.05em;
      transition: opacity 0.3s, color 0.2s;
      white-space: nowrap;
    }
    #reset-btn:hover { color: #000; border-bottom-color: #000; }
  </style>
</head>
<body>

  <div id="header">
    To Advanced Disciples,<br>
    For those who have eyes to see and ears to hear: sit on the plinth and pick your struggle.
  </div>

  <div id="scroll-container">
    <canvas id="c"></canvas>
  </div>
  <button id="reset-btn" onclick="resetView()">⌖ recenter</button>

  <div id="footer">&copy; 2026 Advanced Disciples &nbsp;·&nbsp; All rights reserved</div>

<script>
const container = document.getElementById('scroll-container');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

const DATA = {
  id:'root', name:'',
  children:[
    { id:'shop', name:'Shop', shopNode:true, desc:'Unavailable for Now', children:[] },
    { id:'objects', name:'Objects',
      children:[
        { id:'paintings', name:'Paintings', children:[
          { id:'p1', name:'Untitled No. 1', href:'entry.html', leaf:true, img:'painting-01.jpg' },
          { id:'p2', name:'Study in Blue',  href:'entry.html', leaf:true, img:'painting-02.jpg' },
          { id:'p3', name:'Horizon III',    href:'entry.html', leaf:true, img:'painting-03.jpg' },
        ]},
        { id:'sketches', name:'Sketches', children:[
          { id:'s1', name:'Receipt sketch', href:'entry-sketch-01.html', leaf:true, img:'sketch-01.jpg' },
          { id:'s2', name:'Figure study',   href:'entry-sketch-02.html', leaf:true, img:'sketch-02.jpg' },
        ]},
        { id:'obj2', name:'Brooches', children:[
          { id:'o1', name:'Found object', href:'entry-object-01.html', leaf:true, img:'object-01.jpg' },
        ]},
      ]
    },
    { id:'chronology', name:'Chronology',
      children:[
        { id:'c1', name:'spawned',            date:'2001',      desc:'ah hell nah',                                                        chron:true },
        { id:'c2', name:'fell on my chin',    date:'2013',      desc:'Tabula Rasa',                                                        chron:true },
        { id:'c3', name:'coordinate swap',    date:'2015',      desc:'Bye, Korea. Hello, Americans :)',                                    chron:true },
        { id:'c4', name:'impasse arena',      date:'2015–2021', desc:'Schools',                                                                    chron:true },
        { id:'c5', name:'coordinate swap v2', date:'2021',      desc:'Moved to Detroit.',                                                  chron:true },
        { id:'c6', name:'autistic sage',      date:'2025',      desc:'- bought me many lamingtons and shown me corners to watch out for.', chron:true },
        { id:'c7', name:'now',                date:'',          desc:'imbibing all yo frameworks.',                                        chron:true },
      ]
    },
    { id:'contact', name:'Contact',
      children:[
        { id:'cemail', name:'email // dcho90014@gmail.com', href:'mailto:dcho90014@gmail.com', contact:true },
        { id:'cinsta', name:'instagram // @d.hamanjo',       href:'https://instagram.com/d.hamanjo', contact:true },
      ]
    },
  ]
};

const COL = 190, ROW = 58, PAD_T = 0, DR = 5, SPD = 0.10;
let PAD_L = 0;
let W = 800, H = 500;

const collapsed = new Set();
const descOpen  = new Set();
const pos = {};
let animating = true, rafId;

function lerp(a, b, t) { return a + (b - a) * t; }

// init — collapse everything except root's direct children visibility
function initCollapsed() {
  DATA.children.forEach(ch => {
    collapsed.add(ch.id);
    if (ch.children) ch.children.forEach(l2 => {
      if (l2.children && l2.children.length) collapsed.add(l2.id);
    });
  });
}

function visibleChildren(node) {
  if (!node.children || node.children.length === 0) return [];
  if (collapsed.has(node.id)) return [];
  return node.children;
}

function assignTargets(node, depth, counter, parentId) {
  const kids = visibleChildren(node);
  const tx = PAD_L + depth * COL;
  if (!kids.length) {
    const ty = PAD_T + counter.i * ROW;
    counter.i++;
    setT(node.id, tx, ty, 1, parentId);
    return { min: ty, max: ty };
  }
  let mn = Infinity, mx = -Infinity;
  kids.forEach(c => {
    const r = assignTargets(c, depth + 1, counter, node.id);
    mn = Math.min(mn, r.min); mx = Math.max(mx, r.max);
  });
  const ty = (mn + mx) / 2;
  setT(node.id, tx, ty, 1, parentId);
  return { min: mn, max: mx };
}

function assignHidden(node) {
  if (!node.children) return;
  if (collapsed.has(node.id)) {
    node.children.forEach(c => {
      const p = pos[node.id];
      setT(c.id, p ? p.tx : PAD_L, p ? p.ty : PAD_T, 0, node.id);
      assignHidden(c);
    });
  } else {
    node.children.forEach(c => assignHidden(c));
  }
}

function setT(id, tx, ty, ta, parentId) {
  if (!pos[id]) {
    const px = pos[parentId]?.x ?? tx;
    const py = pos[parentId]?.y ?? ty;
    pos[id] = { x: px, y: py, tx, ty, a: ta, ta, descOpen: false };
  } else {
    pos[id].tx = tx; pos[id].ty = ty; pos[id].ta = ta;
  }
}

function recompute() {
  const counter = { i: 0 };
  assignTargets(DATA, 0, counter, null);
  assignHidden(DATA);

  // canvas fills the container viewport
  W = container.offsetWidth || window.innerWidth;
  H = container.offsetHeight || window.innerHeight - 120;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);

  // center root dot on first load
  if (camX === 0 && camY === 0) {
    camX = W / 2;
    camY = H / 2;
  }

  animating = true;
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(tick);
}

let initialFitDone = false;

// image cache
const imgCache = {};
function loadImg(src) {
  if (!src) return null;
  if (!imgCache[src]) {
    const im = new Image();
    imgCache[src] = im;
    im.onload = () => { animating = true; cancelAnimationFrame(rafId); rafId = requestAnimationFrame(tick); };
    im.src = src;
  }
  return imgCache[src];
}

function tick() {
  let moving = false;
  Object.values(pos).forEach(p => {
    const dx = p.tx - p.x, dy = p.ty - p.y, da = p.ta - p.a;
    if (Math.abs(dx) > 0.2 || Math.abs(dy) > 0.2 || Math.abs(da) > 0.005) {
      moving = true;
      p.x = lerp(p.x, p.tx, SPD);
      p.y = lerp(p.y, p.ty, SPD);
      p.a = lerp(p.a, p.ta, SPD);
    } else {
      p.x = p.tx; p.y = p.ty; p.a = p.ta;
    }
  });
  draw();
  if (moving) rafId = requestAnimationFrame(tick);
  else animating = false;
}

function curve(ax, ay, bx, by, alpha) {
  if (alpha < 0.01) return;
  const mx = (ax + bx) / 2;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.bezierCurveTo(mx, ay, mx, by, bx, by);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawAll(node, parent) {
  const p = pos[node.id];
  if (!p) return;

  if (parent) {
    const pp = pos[parent.id];
    if (pp) curve(pp.x, pp.y, p.x, p.y, Math.min(pp.a, p.a));
  }

  if (p.a < 0.01) {
    visibleChildren(node).forEach(c => drawAll(c, node));
    if (node.children && collapsed.has(node.id)) node.children.forEach(c => drawAll(c, node));
    return;
  }

  ctx.save();
  ctx.globalAlpha = p.a;

  // dot
  ctx.beginPath();
  ctx.arc(p.x, p.y, DR, 0, Math.PI*2);
  ctx.fillStyle = !parent ? '#fff' : '#d8e8f5';
  ctx.fill();
  ctx.strokeStyle = !parent ? '#aaa' : '#7aa7d4';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const isRoot  = !parent;
  const isChron = node.chron;
  const isLeaf  = node.leaf;
  const isContact = node.contact;
  const mob = window.innerWidth < 600;

  if (isRoot) {
    // no label
  } else if (node.shopNode || (node.children !== undefined && !isChron && !isLeaf && !isContact)) {
    // parent/category label — LEFT of dot
    ctx.textAlign = 'right';
    ctx.fillStyle = '#1a1a1a';
    ctx.font = (mob ? '11px' : '12px') + ' monospace';
    ctx.fillText(node.name, p.x - DR - 7, p.y + 4);
    // shop desc
    if (node.shopNode && descOpen.has(node.id)) {
      ctx.textAlign = 'left';
      ctx.fillStyle = '#888';
      ctx.font = '10px monospace';
      ctx.fillText(node.desc, p.x + DR + 7, p.y + 4);
    }
  } else if (isChron) {
    ctx.textAlign = 'left';
    if (node.date) {
      ctx.fillStyle = '#bbb';
      ctx.font = '9px monospace';
      ctx.fillText(node.date, p.x + DR + 7, p.y - 13);
    }
    ctx.fillStyle = '#1a1a1a';
    ctx.font = (mob ? '10px' : '11px') + ' monospace';
    ctx.fillText(node.name, p.x + DR + 7, p.y - 3);
    if (descOpen.has(node.id) && node.desc) {
      ctx.fillStyle = '#888';
      ctx.font = '9px monospace';
      const maxDescW = window.innerWidth < 600 ? 140 : 200;
      const words = node.desc.split(' ');
      let line = '', lines = [];
      for (const w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxDescW && line) { lines.push(line); line = w; }
        else line = test;
      }
      if (line) lines.push(line);
      lines.forEach((l, i) => ctx.fillText(l, p.x + DR + 7, p.y + 14 + i * 14));
    }
  } else if (isContact) {
    ctx.textAlign = 'left';
    ctx.font = (mob ? '10px' : '11px') + ' monospace';
    const parts = node.name.split(' // ');
    if (parts.length === 2) {
      ctx.fillStyle = '#1a1a1a';
      const pw = ctx.measureText(parts[0] + ' // ').width;
      ctx.fillText(parts[0] + ' // ', p.x + DR + 7, p.y + 4);
      ctx.fillStyle = '#00e';
      ctx.fillText(parts[1], p.x + DR + 7 + pw, p.y + 4);
    }
  } else if (isLeaf) {
    // leaf — LEFT of dot, capitalized, black
    ctx.textAlign = 'right';
    ctx.fillStyle = '#1a1a1a';
    ctx.font = (mob ? '10px' : '11px') + ' monospace';
    const label = node.name.charAt(0).toUpperCase() + node.name.slice(1);
    ctx.fillText(label, p.x - DR - 7, p.y + 4);
    // thumbnail RIGHT
    if (node.img) {
      const im = loadImg(node.img);
      const tw = 52, th = 38;
      const ix = p.x + DR + 8, iy = p.y - th / 2;
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
      ctx.strokeRect(ix, iy, tw, th);
      if (im && im.complete && im.naturalWidth) ctx.drawImage(im, ix, iy, tw, th);
      else { ctx.fillStyle = '#f0f0f0'; ctx.fillRect(ix, iy, tw, th); }
    }
  }

  ctx.restore();

  visibleChildren(node).forEach(c => drawAll(c, node));
  if (node.children && collapsed.has(node.id)) node.children.forEach(c => drawAll(c, node));
}

function draw() {
  const cw = canvas.width / dpr, ch = canvas.height / dpr;
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(camScale, camScale);
  drawAll(DATA, null);
  ctx.restore();
}

function allNodes(node, arr) {
  arr.push(node);
  if (node.children) node.children.forEach(c => allNodes(c, arr));
  return arr;
}

function collapseDeep(node) {
  if (!node.children) return;
  node.children.forEach(ch => {
    collapsed.add(ch.id);
    collapseDeep(ch);
  });
}

function handleInput(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  const mx = (clientX - r.left - camX) / camScale;
  const my = (clientY - r.top  - camY) / camScale;

  for (const node of allNodes(DATA, [])) {
    const p = pos[node.id];
    if (!p || p.a < 0.05) continue;
    const hitR = window.innerWidth < 600 ? DR + 22 : DR + 14;

    // image box click
    if (node.img) {
      const tw = 52, th = 38;
      const ix = p.x + DR + 8, iy = p.y - th / 2;
      if (mx >= ix && mx <= ix + tw && my >= iy && my <= iy + th) {
        openModal(node); return;
      }
    }

    if (Math.hypot(mx - p.x, my - p.y) > hitR / camScale) continue;

    if (node.id === 'root') {
      const allC = DATA.children.every(ch => collapsed.has(ch.id));
      if (allC) {
        // expand L1 only, keep everything deeper collapsed
        DATA.children.forEach(ch => {
          collapsed.delete(ch.id);
          collapseDeep(ch);
        });
      } else {
        // collapse everything including L1
        DATA.children.forEach(ch => collapsed.add(ch.id));
        collapseDeep(DATA);
      }
      recompute(); return;
    }
    if (node.shopNode || node.chron) {
      if (descOpen.has(node.id)) descOpen.delete(node.id);
      else descOpen.add(node.id);
      animating = true;
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(tick);
      return;
    }
    if (isLeafNode(node)) {
      if (node.href) window.location.href = node.href;
      return;
    }
    if (node.children && node.children.length > 0) {
      if (collapsed.has(node.id)) collapsed.delete(node.id);
      else collapsed.add(node.id);
      recompute(); return;
    }
  }
}

function isLeafNode(node) {
  return node.leaf || node.contact;
}

// ── Pan & Zoom ────────────────────────────────────────────────
let camX = 0, camY = 0, camScale = 1;
const MIN_SCALE = 0.2, MAX_SCALE = 3;

function toWorld(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (cx - r.left - camX) / camScale,
    y: (cy - r.top  - camY) / camScale
  };
}

// Mouse wheel zoom
container.addEventListener('wheel', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, camScale * delta));
  camX = mx - (mx - camX) * (newScale / camScale);
  camY = my - (my - camY) * (newScale / camScale);
  camScale = newScale;
  drawWithCam();
  resetIdleTimer();
}, { passive: false });

// Touch pan + pinch zoom
let touches = {};
let lastPinchDist = 0;
let panStartX = 0, panStartY = 0, camStartX = 0, camStartY = 0;
let isPinching = false, isTapping = false;
let tapStartX = 0, tapStartY = 0;

container.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => touches[t.identifier] = { x: t.clientX, y: t.clientY });
  const ids = Object.keys(touches);
  if (ids.length === 1) {
    isTapping = true; isPinching = false;
    tapStartX = touches[ids[0]].x; tapStartY = touches[ids[0]].y;
    panStartX = touches[ids[0]].x; panStartY = touches[ids[0]].y;
    camStartX = camX; camStartY = camY;
  } else if (ids.length === 2) {
    isPinching = true; isTapping = false;
    const a = touches[ids[0]], b = touches[ids[1]];
    lastPinchDist = Math.hypot(b.x - a.x, b.y - a.y);
  }
}, { passive: false });

container.addEventListener('touchmove', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => touches[t.identifier] = { x: t.clientX, y: t.clientY });
  const ids = Object.keys(touches);
  if (ids.length === 1 && !isPinching) {
    const dx = touches[ids[0]].x - panStartX;
    const dy = touches[ids[0]].y - panStartY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) isTapping = false;
    camX = camStartX + dx;
    camY = camStartY + dy;
    drawWithCam();
  } else if (ids.length === 2) {
    isTapping = false;
    const a = touches[ids[0]], b = touches[ids[1]];
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const delta = dist / lastPinchDist;
    const midX = (a.x + b.x) / 2 - canvas.getBoundingClientRect().left;
    const midY = (a.y + b.y) / 2 - canvas.getBoundingClientRect().top;
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, camScale * delta));
    camX = midX - (midX - camX) * (newScale / camScale);
    camY = midY - (midY - camY) * (newScale / camScale);
    camScale = newScale;
    lastPinchDist = dist;
    drawWithCam();
  }
}, { passive: false });

container.addEventListener('touchend', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => delete touches[t.identifier]);
  if (Object.keys(touches).length === 0) {
    if (isTapping) {
      const r = canvas.getBoundingClientRect();
      handleInput(tapStartX, tapStartY);
    }
    isPinching = false; isTapping = false;
  }
}, { passive: false });

// Mouse pan
let mouseDown = false, mouseMoved = false, mStartX = 0, mStartY = 0, mCamX = 0, mCamY = 0;
canvas.addEventListener('mousedown', e => {
  mouseDown = true; mouseMoved = false;
  mStartX = e.clientX; mStartY = e.clientY;
  mCamX = camX; mCamY = camY;
});
window.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const dx = e.clientX - mStartX, dy = e.clientY - mStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mouseMoved = true;
  camX = mCamX + dx; camY = mCamY + dy;
  drawWithCam();
});
window.addEventListener('mouseup', e => {
  if (mouseDown && !mouseMoved) handleInput(e.clientX, e.clientY);
  mouseDown = false;
});

function getBounds() {
  // get bounding box of all visible nodes
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  Object.values(pos).forEach(p => {
    if (p.a < 0.1) return;
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
  });
  return { minX, maxX, minY, maxY };
}

function resetView() {
  const b = getBounds();
  if (b.minX === Infinity) return;
  const pw = W, ph = H;
  const treeW = b.maxX - b.minX + 200;
  const treeH = b.maxY - b.minY + 100;
  const scale = Math.min(MAX_SCALE, Math.min(pw / treeW, ph / treeH) * 0.85);
  const cx = (b.minX + b.maxX) / 2;
  const cy = (b.minY + b.maxY) / 2;
  // animate to center
  const targetX = pw / 2 - cx * scale;
  const targetY = ph / 2 - cy * scale;
  animateCam(targetX, targetY, scale);
}

function animateCam(tx, ty, ts) {
  const startX = camX, startY = camY, startS = camScale;
  const dur = 400, start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / dur);
    const e = 1 - Math.pow(1 - t, 3); // ease out cubic
    camX = startX + (tx - startX) * e;
    camY = startY + (ty - startY) * e;
    camScale = startS + (ts - startS) * e;
    drawWithCam();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// auto recenter if user pans away — show button after idle
let idleTimer;
function resetIdleTimer() {
  // button always visible — no hiding
}

document.getElementById('reset-btn').style.opacity = '1';

function drawWithCam() {
  const cw = canvas.width / dpr, ch = canvas.height / dpr;
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(camScale, camScale);
  drawAll(DATA, null);
  ctx.restore();
}

// modal
function openModal(node) {
  document.getElementById('modal-img').src = node.img || '';
  document.getElementById('modal-title').textContent = node.name;
  document.getElementById('modal-desc').textContent = node.desc || '';
  document.getElementById('inq-name').value = '';
  document.getElementById('inq-email').value = '';
  document.getElementById('inq-msg').value = '';
  document.getElementById('inq-msg-sent').style.display = 'none';
  document.getElementById('modal').style.display = 'block';
  window._modalNode = node;
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function submitInquiry() {
  const name = document.getElementById('inq-name').value.trim();
  const email = document.getElementById('inq-email').value.trim();
  const msg = document.getElementById('inq-msg').value.trim();
  const work = window._modalNode ? window._modalNode.name : '';
  if (!name || !email) { alert('Please enter your name and email.'); return; }
  window.location.href = 'mailto:dcho90014@gmail.com?subject=' + encodeURIComponent('Inquiry: ' + work) +
    '&body=' + encodeURIComponent('Work: ' + work + '\nFrom: ' + name + '\nEmail: ' + email + '\n\n' + (msg || ''));
  document.getElementById('inq-msg-sent').style.display = 'inline';
}

window.addEventListener('load', () => {
  initCollapsed();
  recompute();
  setTimeout(() => {
    if (!initialFitDone) {
      initialFitDone = true;
      resetView();
    }
  }, 350);
});
window.addEventListener('resize', () => recompute());
</script>
